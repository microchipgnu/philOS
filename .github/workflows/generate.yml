name: PhilOS Generate Reports

on:
  schedule:
    - cron: '0 7,12,17,22 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install OpenCode
        run: curl -fsSL https://opencode.ai/install | bash

      - name: Install skills
        run: |
          npx skills add https://github.com/microchipgnu/philos --skill analysis -y
          npx skills add https://github.com/frames-engineering/skills --skill agentwallet -y
          npx skills add https://github.com/frames-engineering/skills --skill registry -y

      - name: Setup credentials
        env:
          AGENTWALLET_USERNAME: ${{ secrets.AGENTWALLET_USERNAME }}
          AGENTWALLET_API_TOKEN: ${{ secrets.AGENTWALLET_API_TOKEN }}
        run: |
          # Mask secrets in CI logs
          for secret in "$AGENTWALLET_USERNAME" "$AGENTWALLET_API_TOKEN"; do
            if [ -n "$secret" ]; then
              echo "::add-mask::$secret"
            fi
          done

          # Write to home dir (for agentwallet skill)
          mkdir -p ~/.agentwallet
          printf '{"username":"%s","apiToken":"%s"}' "$AGENTWALLET_USERNAME" "$AGENTWALLET_API_TOKEN" > ~/.agentwallet/config.json
          chmod 600 ~/.agentwallet/config.json

          # Mirror to repo dir (avoids external_directory permission)
          mkdir -p .agentwallet
          cp ~/.agentwallet/config.json .agentwallet/config.json
          chmod 600 .agentwallet/config.json

          # Setup Frames Registry auth for OpenCode
          export FRAMES_API_KEY="${AGENTWALLET_USERNAME}:${AGENTWALLET_API_TOKEN}"
          echo "FRAMES_API_KEY=$FRAMES_API_KEY" >> $GITHUB_ENV
          echo "::add-mask::$FRAMES_API_KEY"

      - name: Configure Git
        run: |
          git config user.name "philos-bot"
          git config user.email "philos-bot@users.noreply.github.com"

      - name: Run PhilOS agent
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          AGENTWALLET_USERNAME: ${{ secrets.AGENTWALLET_USERNAME }}
          AGENTWALLET_API_TOKEN: ${{ secrets.AGENTWALLET_API_TOKEN }}
        timeout-minutes: 55
        run: |
          opencode run --print-logs "$(cat .philos/prompt.md)"

      - name: Validate and clean reports
        run: |
          python3 << 'PYEOF'
          import json, glob, os, urllib.request, re, time

          def get_og_image(url):
              try:
                  req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
                  html = urllib.request.urlopen(req, timeout=8).read().decode("utf-8", errors="ignore")[:50000]
                  m = re.search(r'<meta[^>]*property=["\']og:image["\'][^>]*content=["\']([^"\']+)["\']', html)
                  if not m:
                      m = re.search(r'<meta[^>]*content=["\']([^"\']+)["\'][^>]*property=["\']og:image["\']', html)
                  if m:
                      img = m.group(1)
                      if any(skip in img.lower() for skip in ["logo","favicon","icon","default","1x1","avatar"]):
                          return None
                      return img
              except:
                  pass
              return None

          def download(img_url, local_path):
              try:
                  os.makedirs(os.path.dirname(local_path), exist_ok=True)
                  req = urllib.request.Request(img_url, headers={"User-Agent": "Mozilla/5.0"})
                  data = urllib.request.urlopen(req, timeout=10).read()
                  if len(data) < 5000:
                      return False
                  with open(local_path, "wb") as f:
                      f.write(data)
                  return True
              except:
                  return False

          files = glob.glob("content/reports/*/*.json")
          files = [f for f in files if not any(x in f for x in ['index.json','threads.json','video.json'])]

          fixed = removed = 0
          for filepath in files:
              data = json.load(open(filepath))
              img = data.get("coverImage")
              if not img:
                  continue
              local = img.get("local","").lstrip("/")
              full_path = os.path.join("site/public", local)
              if os.path.exists(full_path) and os.path.getsize(full_path) >= 5000:
                  continue

              # Try to re-download from the URL in coverImage first
              fetched = False
              existing_url = img.get("url")
              if existing_url and existing_url.startswith("http"):
                  if download(existing_url, full_path):
                      fixed += 1
                      fetched = True

              # Try each source
              if not fetched:
                  for source in data.get("sources", []):
                      og = get_og_image(source["url"])
                      if og and download(og, full_path):
                          data["coverImage"] = {
                              "url": og,
                              "local": img["local"],
                              "credit": source["publisher"],
                          }
                          with open(filepath, "w") as f:
                              json.dump(data, f, indent=2, ensure_ascii=False)
                          fixed += 1
                          fetched = True
                          break
                      time.sleep(0.2)

              if not fetched:
                  # Remove the broken coverImage field
                  del data["coverImage"]
                  with open(filepath, "w") as f:
                      json.dump(data, f, indent=2, ensure_ascii=False)
                  removed += 1
                  print(f"REMOVED broken coverImage: {data['id']}")
              time.sleep(0.2)

          print(f"Validated: {fixed} fixed, {removed} removed")
          PYEOF

      - name: Commit reports
        run: |
          git add content/ .philos/state.json site/public/images/
          git diff --cached --quiet || git commit -m "[philos] Reports $(date -u +%Y-%m-%d)"
          git pull --rebase || true
          git push
