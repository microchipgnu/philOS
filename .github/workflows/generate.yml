name: PhilOS Generate Reports

on:
  schedule:
    - cron: '0 7,12,17,22 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install OpenCode
        run: curl -fsSL https://opencode.ai/install | bash

      - name: Install skills
        run: |
          npx skills add https://github.com/microchipgnu/philos --skill analysis -y
          npx skills add https://github.com/frames-engineering/skills --skill agentwallet -y
          npx skills add https://github.com/frames-engineering/skills --skill registry -y

      - name: Setup credentials
        env:
          AGENTWALLET_USERNAME: ${{ secrets.AGENTWALLET_USERNAME }}
          AGENTWALLET_API_TOKEN: ${{ secrets.AGENTWALLET_API_TOKEN }}
        run: |
          # Mask secrets in CI logs
          for secret in "$AGENTWALLET_USERNAME" "$AGENTWALLET_API_TOKEN"; do
            if [ -n "$secret" ]; then
              echo "::add-mask::$secret"
            fi
          done

          # Write to home dir (for agentwallet skill)
          mkdir -p ~/.agentwallet
          printf '{"username":"%s","apiToken":"%s"}' "$AGENTWALLET_USERNAME" "$AGENTWALLET_API_TOKEN" > ~/.agentwallet/config.json
          chmod 600 ~/.agentwallet/config.json

          # Mirror to repo dir (avoids external_directory permission)
          mkdir -p .agentwallet
          cp ~/.agentwallet/config.json .agentwallet/config.json
          chmod 600 .agentwallet/config.json

          # Setup Frames Registry auth for OpenCode
          export FRAMES_API_KEY="${AGENTWALLET_USERNAME}:${AGENTWALLET_API_TOKEN}"
          echo "FRAMES_API_KEY=$FRAMES_API_KEY" >> $GITHUB_ENV
          echo "::add-mask::$FRAMES_API_KEY"

      - name: Configure Git
        run: |
          git config user.name "philos-bot"
          git config user.email "philos-bot@users.noreply.github.com"

      - name: Run PhilOS agent
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          AGENTWALLET_USERNAME: ${{ secrets.AGENTWALLET_USERNAME }}
          AGENTWALLET_API_TOKEN: ${{ secrets.AGENTWALLET_API_TOKEN }}
        timeout-minutes: 15
        run: |
          opencode run --print-logs "$(cat .philos/prompt.md)"

      - name: Commit reports
        run: |
          git add content/ .philos/state.json
          git diff --cached --quiet || git commit -m "[philos] Reports $(date -u +%Y-%m-%d)"
          git pull --rebase || true
          git push
